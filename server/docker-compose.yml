services:
  postgres:
    image: postgres:16-alpine
    container_name: simian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: simian
      POSTGRES_PASSWORD: simian
      POSTGRES_DB: simian
    ports:
      - "5432:5432"
    volumes:
      - simian-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simian -d simian"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  simian-pg:
