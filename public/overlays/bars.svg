<?xml version="1.0" encoding="UTF-8"?>
<!--
  Glitch overlay — random horizontal bars at varying y positions.
  Designed to layer over content via mix-blend-mode: screen at low
  opacity. Includes RGB-channel-shifted twin bars in a few places to
  fake chromatic aberration.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="none" aria-hidden="true">
  <defs>
    <pattern id="scan" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- thin scanlines across whole frame -->
  <rect width="100%" height="100%" fill="url(#scan)"/>

  <!-- thick coloured glitch bars -->
  <g>
    <rect x="0"   y="118" width="1920" height="3" fill="#0040ff" opacity="0.30"/>
    <rect x="0"   y="121" width="1920" height="1" fill="#ff2d2d" opacity="0.40"/>
    <rect x="240" y="120" width="780"  height="2" fill="#ffffff" opacity="0.55"/>

    <rect x="0"   y="298" width="1920" height="2" fill="#0040ff" opacity="0.20"/>
    <rect x="980" y="298" width="540"  height="2" fill="#ff2d2d" opacity="0.45"/>

    <rect x="0"   y="452" width="1920" height="4" fill="#0040ff" opacity="0.25"/>
    <rect x="0"   y="456" width="1920" height="1" fill="#ff2d2d" opacity="0.45"/>
    <rect x="80"  y="455" width="220"  height="6" fill="#ffffff" opacity="0.55"/>

    <rect x="0"   y="640" width="1920" height="2" fill="#ff2d2d" opacity="0.35"/>

    <rect x="0"   y="788" width="1920" height="3" fill="#0040ff" opacity="0.28"/>
    <rect x="0"   y="791" width="1920" height="1" fill="#ff2d2d" opacity="0.40"/>
    <rect x="1380" y="789" width="500" height="3" fill="#ffffff" opacity="0.40"/>

    <rect x="0"   y="944" width="1920" height="2" fill="#0040ff" opacity="0.22"/>
    <rect x="0"   y="946" width="1920" height="1" fill="#ff2d2d" opacity="0.30"/>
  </g>
</svg>
