<?xml version="1.0" encoding="UTF-8"?>
<!--
  Simian variant 02 — side profile, head turned right.
  Same eye-glow + silhouette idiom as variant 01 so the family reads
  consistent. Kept as flat SVG for low cost.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" aria-hidden="true">
  <defs>
    <radialGradient id="eyeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0040ff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#0040ff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0040ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Skull, profile facing right -->
  <path
    d="M 70 90
       C 50 100, 40 140, 50 180
       C 50 230, 90 260, 140 260
       L 200 260
       C 240 260, 260 240, 250 200
       L 260 175
       C 270 158, 270 140, 258 130
       C 252 110, 240 90, 215 80
       C 180 70, 110 75, 70 90 Z"
    fill="#000"/>

  <!-- Brow ridge ahead of eye -->
  <path d="M 175 130 Q 220 132 252 142 L 250 156 Q 215 144 175 144 Z" fill="#040409"/>

  <!-- Snout protrusion -->
  <ellipse cx="248" cy="184" rx="48" ry="32" fill="#0a0a14"/>
  <path d="M 240 200 Q 270 208 290 196 L 286 214 Q 264 220 244 212 Z" fill="#000"/>
  <path d="M 240 222 Q 270 232 282 224" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Ear -->
  <ellipse cx="78" cy="170" rx="16" ry="22" fill="#000"/>
  <ellipse cx="78" cy="170" rx="6" ry="10" fill="#0a0a14"/>

  <!-- Single visible eye + glow -->
  <circle cx="200" cy="158" r="14" fill="url(#eyeGlow2)"/>
  <circle cx="202" cy="158" r="3.5" fill="#0040ff"/>
  <circle cx="203" cy="156" r="1.2" fill="#fff"/>
</svg>
